<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Left</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #050508; overflow: hidden; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(20, 20, 40, 0.8) 0%, transparent 70%),
    #050508;
}
#countdown {
  display: flex;
  gap: 2vw;
  user-select: none;
}
.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.value {
  font-family: 'Space Grotesk', monospace, sans-serif;
  font-size: 10vw;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: #fff;
  text-shadow:
    0 0 40px rgba(100, 140, 255, 0.3),
    0 0 80px rgba(100, 140, 255, 0.1);
}
.label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.2vw;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 0.35em;
  margin-top: 1.2vw;
  color: rgba(100, 140, 255, 0.5);
}
.sep {
  font-family: 'Space Grotesk', monospace, sans-serif;
  font-size: 9vw;
  font-weight: 300;
  line-height: 1;
  align-self: flex-start;
  color: rgba(100, 140, 255, 0.15);
}
.line {
  position: absolute;
  bottom: -0.5vw;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(100, 140, 255, 0.2), transparent);
}
.detail {
  display: none;
  align-items: center;
  gap: 0.8vw;
  align-self: center;
}
.detail.visible {
  display: flex;
}
.value-sm {
  font-family: 'Space Grotesk', monospace, sans-serif;
  font-size: 5vw;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: #fff;
  text-shadow:
    0 0 30px rgba(100, 140, 255, 0.2),
    0 0 60px rgba(100, 140, 255, 0.08);
}
.unit-sm {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.label-sm {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7vw;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 0.35em;
  margin-top: 0.6vw;
  color: rgba(100, 140, 255, 0.4);
}
.sep-sm {
  font-family: 'Space Grotesk', monospace, sans-serif;
  font-size: 4.5vw;
  font-weight: 300;
  line-height: 1;
  color: rgba(100, 140, 255, 0.15);
  align-self: flex-start;
}
@media (max-width: 768px) {
  .value { font-size: 13vw; }
  .sep { font-size: 11vw; }
  .label { font-size: 2.2vw; }
  #countdown { gap: 1.5vw; }
}
</style>
</head>
<body>
<div id="countdown">
  <div class="unit"><div class="value" id="mo">00</div><div class="label">Months</div><div class="line"></div></div>
  <div class="sep">:</div>
  <div class="unit"><div class="value" id="wk">00</div><div class="label">Weeks</div><div class="line"></div></div>
  <div class="sep">:</div>
  <div class="unit"><div class="value" id="da">00</div><div class="label">Days</div><div class="line"></div></div>
  <div class="sep">:</div>
  <div class="unit"><div class="value" id="hr">00</div><div class="label">Hours</div><div class="line"></div></div>
  <div class="detail" id="detail">
    <div class="sep-sm">:</div>
    <div class="unit-sm"><div class="value-sm" id="mi">00</div><div class="label-sm">Min</div></div>
    <div class="sep-sm">:</div>
    <div class="unit-sm"><div class="value-sm" id="se">00</div><div class="label-sm">Sec</div></div>
  </div>
</div>
<script>
// Locked start: 9 March 2026 (Monday), 00:00 GMT — 4 months target: 9 July 2026, 00:00 GMT
const start = Date.UTC(2026, 2, 9, 0, 0, 0);
const target = Date.UTC(2026, 6, 9, 0, 0, 0);

const moEl = document.getElementById('mo');
const wkEl = document.getElementById('wk');
const daEl = document.getElementById('da');
const hrEl = document.getElementById('hr');
const miEl = document.getElementById('mi');
const seEl = document.getElementById('se');
const detailEl = document.getElementById('detail');

let showDetail = false;
document.addEventListener('keyup', (e) => {
  if (e.key === 't' || e.key === 'T') {
    showDetail = !showDetail;
    detailEl.classList.toggle('visible', showDetail);
  }
});

function getRemaining(now) {
  const end = new Date(target);
  const cur = new Date(Math.min(now, target));
  // Months (UTC)
  let months = (end.getUTCFullYear() - cur.getUTCFullYear()) * 12 + (end.getUTCMonth() - cur.getUTCMonth());
  const shifted = Date.UTC(cur.getUTCFullYear(), cur.getUTCMonth() + months, cur.getUTCDate(), cur.getUTCHours(), cur.getUTCMinutes(), cur.getUTCSeconds());
  if (shifted > target) months--;
  const base = Date.UTC(cur.getUTCFullYear(), cur.getUTCMonth() + months, cur.getUTCDate(), cur.getUTCHours(), cur.getUTCMinutes(), cur.getUTCSeconds());
  const diffMs = target - base;
  const totalSec = Math.floor(diffMs / 1000);
  const totalDays = Math.floor(totalSec / 86400);
  return {
    months: Math.max(0, months),
    weeks: Math.floor(totalDays / 7),
    days: totalDays % 7,
    hours: Math.floor((totalSec % 86400) / 3600),
    minutes: Math.floor((totalSec % 3600) / 60),
    seconds: totalSec % 60
  };
}

function pad(n) { return String(n).padStart(2, '0'); }

function update() {
  const now = Date.now();
  if (now >= target) {
    moEl.textContent = '00';
    wkEl.textContent = '00';
    daEl.textContent = '00';
    hrEl.textContent = '00';
    miEl.textContent = '00';
    seEl.textContent = '00';
    return;
  }
  const r = getRemaining(now);
  moEl.textContent = pad(r.months);
  wkEl.textContent = pad(r.weeks);
  daEl.textContent = pad(r.days);
  hrEl.textContent = pad(r.hours);
  miEl.textContent = pad(r.minutes);
  seEl.textContent = pad(r.seconds);
  requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
